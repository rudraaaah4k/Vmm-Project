<!DOCTYPE html>
<html>
<head>
    <title>DOM Practice</title>
    <style>
        .box {
            width: 200px;
            height: 100px;
            background-color: lightgray;
            text-align: center;
            line-height: 100px;
            margin-top: 10px;
        }

        .active {
            background-color: green;
            color: white;
        }
    </style>
</head>
<body>

    <h1 id="heading">Hello World</h1>

    <button id="changeText">Change Text</button>
    <button id="changeColor">Change Color</button>
    <button id="addElement">Add Element</button>

    <div id="box" class="box">Box</div>

    <script>
        // Change text
        document.getElementById("changeText").onclick = function() {
            document.getElementById("heading").innerText = "DOM is Awesome!";
        };

        // Change color using class toggle
        document.getElementById("changeColor").onclick = function() {
            document.getElementById("box").classList.toggle("active");
        };

        // Add new element
        document.getElementById("addElement").onclick = function() {
            let newPara = document.createElement("p");
            newPara.innerText = "New paragraph added!";
            document.body.appendChild(newPara);
        };
    </script>

</body>
</html>
